<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debian 11 Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-input: #1a2332;
            --border-color: #1e3a5f;
            --text-primary: #e2e8f0;
            --text-dim: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === HEADER === */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-dots {
            display: flex;
            gap: 6px;
        }

        .header-dots span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .header-dots span:nth-child(1) { background: var(--red); }
        .header-dots span:nth-child(2) { background: var(--yellow); }
        .header-dots span:nth-child(3) { background: var(--green); }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-title span {
            color: var(--text-dim);
            font-weight: 400;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--green);
            transition: all 0.3s;
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--red);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }

        .status-badge.offline .status-dot {
            background: var(--red);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* === TERMINAL === */
        .terminal {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-track { background: transparent; }
        .terminal::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        .terminal::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 1.6em;
        }

        /* === INPUT AREA === */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px 4px 4px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-prompt {
            color: var(--green);
            font-size: 13px;
            font-weight: 600;
            user-select: none;
            white-space: nowrap;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            padding: 8px 0;
            caret-color: var(--accent);
        }

        .input-field::placeholder {
            color: var(--text-dim);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .send-btn:hover { background: #2563eb; }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: var(--text-dim); cursor: not-allowed; }

        .input-hint {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 6px;
            padding-left: 2px;
        }

        .input-hint kbd {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 10px;
        }

        /* === ANSI Colors === */
        .ansi-0 { color: #e2e8f0; }
        .ansi-1 { color: #ef4444; }
        .ansi-2 { color: #22c55e; }
        .ansi-3 { color: #eab308; }
        .ansi-4 { color: #3b82f6; }
        .ansi-5 { color: #a855f7; }
        .ansi-6 { color: #06b6d4; }
        .ansi-7 { color: #94a3b8; }
        .ansi-bold { font-weight: bold; }
        .ansi-dim { opacity: 0.5; }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .header { padding: 8px 12px; }
            .header-title { font-size: 11px; }
            .terminal { padding: 12px; font-size: 12px; }
            .input-area { padding: 10px 12px; }
            .send-btn { padding: 8px 14px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-dots">
                <span></span><span></span><span></span>
            </div>
            <div class="header-title">
                root@debian11 <span>:~</span>
            </div>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span id="statusText">Connected</span>
        </div>
    </div>

    <!-- Terminal Output -->
    <div class="terminal" id="terminal"></div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <span class="input-prompt">$</span>
            <input
                type="text"
                class="input-field"
                id="cmdInput"
                placeholder="Type a command..."
                autocomplete="off"
                spellcheck="false"
            >
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
        <div class="input-hint">
            <kbd>Enter</kbd> to send &nbsp; <kbd>&uarr;</kbd><kbd>&darr;</kbd> history &nbsp; <kbd>Ctrl+C</kbd> clear input
        </div>
    </div>

    <script>
        // ============================================
        // WebSocket Terminal Client
        // ============================================
        const terminal = document.getElementById('terminal');
        const cmdInput = document.getElementById('cmdInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');

        let ws = null;
        let cmdHistory = [];
        let historyIndex = -1;
        let reconnectTimer = null;
        let autoScroll = true;

        // --- ANSI to HTML converter ---
        function ansiToHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\x1b\[([0-9;]*)m/g, (match, codes) => {
                    if (!codes) return '</span>';
                    const classes = codes.split(';').map(c => {
                        const n = parseInt(c);
                        if (n === 0) return '';
                        if (n === 1) return 'ansi-bold';
                        if (n === 2) return 'ansi-dim';
                        if (n >= 30 && n <= 37) return `ansi-${n - 30}`;
                        if (n >= 90 && n <= 97) return `ansi-${n - 90}`;
                        return '';
                    }).filter(Boolean).join(' ');
                    return classes ? `<span class="${classes}">` : '</span>';
                })
                .replace(/\x1b\[0m/g, '</span>');
        }

        // --- Append text to terminal ---
        function appendToTerminal(text) {
            const lines = text.split('\n');
            lines.forEach(line => {
                const div = document.createElement('div');
                div.className = 'terminal-line';
                div.innerHTML = ansiToHtml(line);
                terminal.appendChild(div);
            });
            // Keep buffer manageable
            while (terminal.children.length > 3000) {
                terminal.removeChild(terminal.firstChild);
            }
            if (autoScroll) {
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        // --- Set history from buffer ---
        function setHistory(text) {
            terminal.innerHTML = '';
            appendToTerminal(text);
        }

        // --- Detect if user scrolled up ---
        terminal.addEventListener('scroll', () => {
            const atBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 30;
            autoScroll = atBottom;
        });

        // --- Connection status ---
        function setStatus(connected) {
            if (connected) {
                statusBadge.classList.remove('offline');
                statusText.textContent = 'Connected';
            } else {
                statusBadge.classList.add('offline');
                statusText.textContent = 'Reconnecting...';
            }
        }

        // --- Send command ---
        function sendCommand() {
            const cmd = cmdInput.value.trim();
            if (!cmd || !ws || ws.readyState !== WebSocket.OPEN) return;

            cmdHistory.push(cmd);
            historyIndex = cmdHistory.length;
            ws.send(JSON.stringify({ type: 'input', data: cmd }));
            cmdInput.value = '';
        }

        // --- WebSocket connect ---
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${location.host}`;

            ws = new WebSocket(url);
            setStatus(false);

            ws.onopen = () => {
                setStatus(true);
                cmdInput.disabled = false;
                sendBtn.disabled = false;
                cmdInput.focus();
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'history') {
                        setHistory(msg.data);
                    } else if (msg.type === 'output') {
                        appendToTerminal(msg.data);
                    }
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            ws.onclose = () => {
                setStatus(false);
                cmdInput.disabled = true;
                sendBtn.disabled = true;
                // Auto reconnect after 2s
                reconnectTimer = setTimeout(connect, 2000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        // --- Input handlers ---
        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendCommand();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cmdHistory.length > 0 && historyIndex > 0) {
                    historyIndex--;
                    cmdInput.value = cmdHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = cmdHistory[historyIndex];
                } else {
                    historyIndex = cmdHistory.length;
                    cmdInput.value = '';
                }
            } else if (e.key === 'c' && e.ctrlKey) {
                e.preventDefault();
                cmdInput.value = '';
            }
        });

        sendBtn.addEventListener('click', sendCommand);

        // Focus input on click anywhere in terminal area
        terminal.addEventListener('click', () => {
            cmdInput.focus();
        });

        // --- Start ---
        connect();
    </script>
</body>
</html>
